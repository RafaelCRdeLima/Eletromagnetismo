<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eletromagnetismo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #141a22;
      --text: #eef4f8;
      --muted: #b5c0c9;
      --accent: #58c7f3;
      --line: #27313f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 20%, #173044 0, transparent 34%), var(--bg);
      color: var(--text);
      font: 18px/1.5 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, calc(100vw - 40px));
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .36);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0;
      line-height: 1;
    }
    p {
      color: var(--muted);
      margin: 0 0 24px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #061018;
      background: var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 750;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Eletromagnetismo</h1>
    <p>Aulas e apresentações online do curso.</p>
    <a href="capitulo-10/">Abrir Capítulo 10: Magnetostática</a>
  </main>
</body>
</html>
